name: Create docs
on: [ push ]

jobs:
  create_docs:
    name: Create docs
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Cache Local Maven Repository
      uses: actions/cache@v5
      with:
        path: ~/.m2/repository
        key: always-m2

    - name: Cache synced repositories
      uses: actions/cache@v5
      with:
        path: ${{ runner.temp }}/repos
        key: always-repos

    - name: Clone repositories
      run: |
        set -e;
        for repo in buf_01 pth_06; do
          gh repo clone "StrongestNumber9/${repo}" "${{ runner.temp }}/repos/${repo}" --no-upstream;
          (
            cd "${{ runner.temp }}/repos/${repo}";
            git tag | while read -r tag; do
              if [ -n "$(git ls-tree --name-only "${tag}" "antora.yml")" ]; then
                echo "${tag}";
              fi;
            done | jq -R . | jq -s . > "${{ runner.temp }}/tags.${repo}.json";
          )
        done;
        jq '.' "${{ runner.temp }}/tags.*.json";
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Debug
      run: |
        find "${{ runner.temp }}/repos/";
